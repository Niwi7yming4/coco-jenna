modLoader="javafml"
loaderVersion="${loader_version_range}"
license="${mod_license}"

[[mods]]
modId="${mod_id}"
version="${mod_version}"
displayName="${mod_name}"
displayURL="https://github.com/cocojenna/mod"
logoFile="cocojenna.png"
authors="${mod_authors}"
description='''
${mod_description}
'''

[[dependencies.cocojenna]]
    modId="forge"
    mandatory=true
    versionRange="${forge_version_range}"
    ordering="NONE"
    side="BOTH"

[[dependencies.cocojenna]]
    modId="minecraft"
    mandatory=true
    versionRange="${minecraft_version_range}"
    ordering="NONE"
    side="BOTH"

[[dependencies.cocojenna]]
    modId="patchouli"
    mandatory=false
    versionRange="[1.20.1-80,)"
    ordering="AFTER"
    side="BOTH"

[[dependencies.cocojenna]]
    modId="geckolib"
    mandatory=true
    versionRange="[4.4,)"
    ordering="AFTER"
    side="BOTH"
